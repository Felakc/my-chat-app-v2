<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Messenger Pro</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; margin: 0; background: #f0f2f5; overflow: hidden; }
        #auth-screen { position: fixed; inset: 0; background: #f0f2f5; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        #auth-box { background: white; padding: 30px; border-radius: 12px; width: 320px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #sidebar { width: 300px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .sidebar-header { padding: 15px; background: #0084ff; color: white; display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; background: #e5ddd5; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 12px; background: white; align-self: flex-start; max-width: 70%; position: relative; }
        .msg.me { align-self: flex-end; background: #dcf8c6; }
        .del-btn { color: red; cursor: pointer; float: right; font-size: 10px; margin-left: 8px; }
        #input-area { padding: 15px; display: flex; background: white; gap: 10px; }
        #m-input { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        .item { padding: 10px 15px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .item:hover { background: #f9f9f9; }
    </style>
</head>
<body>
<div id="auth-screen">
    <div id="auth-box">
        <h2>Messenger</h2>
        <input type="text" id="u-name" placeholder="Логин" style="width:100%; margin-bottom:10px; padding:8px;">
        <input type="password" id="u-pass" placeholder="Пароль" style="width:100%; margin-bottom:10px; padding:8px;">
        <button onclick="auth('login')" style="width:100%; padding:10px; background:#0084ff; color:white; border:none; border-radius:8px; cursor:pointer;">Войти</button>
        <button onclick="auth('register')" style="margin-top:10px; background:none; border:none; color:green; cursor:pointer;">Регистрация</button>
    </div>
</div>

<div id="sidebar">
    <div class="sidebar-header">
        <span>Чаты</span>
        <button onclick="createGroup()" style="font-size:10px; background:none; border:1px solid white; color:white; cursor:pointer;">+ Группа</button>
    </div>
    <div id="my-tag" style="padding:10px; text-align:center; font-size:12px; background:#f0f7ff;">ID: ...</div>
    <div style="padding:10px; display:flex; gap:5px;">
        <input type="text" id="search-input" placeholder="Имя#1234" style="flex:1;">
        <button onclick="findUser()">🔍</button>
    </div>
    <div id="user-list" style="overflow-y:auto; flex:1;"></div>
</div>

<div style="flex:1; display:flex; flex-direction:column;">
    <div id="chat-header" style="padding:15px; background:white; border-bottom:1px solid #ddd; font-weight:bold; display:flex; justify-content:space-between;">
        <span id="chat-title">Выберите чат</span>
        <div id="group-controls" style="display:none;">
            <button onclick="addMember()" style="font-size:10px;">+ Пригласить</button>
            <button onclick="removeMember()" style="font-size:10px; color:red;">- Удалить</button>
        </div>
    </div>
    <div id="messages"></div>
    <div id="input-area">
        <input type="text" id="m-input" placeholder="Сообщение..." autocomplete="off">
        <button onclick="send()" style="padding:10px 20px; background:#0084ff; color:white; border:none; border-radius:20px; cursor:pointer;">></button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myTag = '', currentRoom = '', isGroup = false;
    let hiddenChats = JSON.parse(localStorage.getItem('hidden-chats') || '[]');

    async function auth(type) {
        const u = document.getElementById('u-name').value;
        const p = document.getElementById('u-pass').value;
        const res = await fetch('/'+type, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p})});
        const data = await res.json();
        if(data.status==='ok') {
            myTag = data.tag;
            document.getElementById('my-tag').innerText = "Ваш ID: " + myTag;
            document.getElementById('auth-screen').remove();
            socket.emit('store-user', myTag);
            loadSidebar();
        } else { alert("Ошибка!"); }
    }

    async function loadSidebar() {
        const res = await fetch('/my-chats/'+myTag);
        const data = await res.json();
        const list = document.getElementById('user-list');
        list.innerHTML = '';

        // Показываем личные чаты (если не скрыты)
        data.partners.filter(p => !hiddenChats.includes(p)).forEach(p => {
            list.innerHTML += `<div class="item">
                <span onclick="openChat('${p}', false)" style="flex:1;">👤 ${p}</span>
                <span onclick="hideChat('${p}')" style="color:gray; font-size:12px;">✕</span>
            </div>`;
        });

        // Показываем группы
        data.groups.forEach(g => {
            list.innerHTML += `<div class="item" onclick="openChat('${g._id}', true, '${g.name}')">
                <span>👥 ${g.name}</span>
            </div>`;
        });
    }

    function hideChat(tag) {
        hiddenChats.push(tag);
        localStorage.setItem('hidden-chats', JSON.stringify(hiddenChats));
        loadSidebar();
    }

    function openChat(id, groupMode, name = '') {
        isGroup = groupMode;
        currentRoom = isGroup ? id : [myTag, id].sort().join('_');
        document.getElementById('chat-title').innerText = isGroup ? name : id;
        document.getElementById('group-controls').style.display = isGroup ? 'block' : 'none';
        document.getElementById('messages').innerHTML = '';
        socket.emit('join room', currentRoom);
    }

    function send() {
        const input = document.getElementById('m-input');
        if(input.value.trim() && currentRoom) {
            socket.emit('chat message', { room: currentRoom, msg: input.value, sender: myTag });
            input.value = '';
        }
    }

    function render(d) {
        if(document.getElementById('msg-'+ (d._id || d.id))) return;
        const div = document.createElement('div');
        div.id = 'msg-' + (d._id || d.id);
        const sender = d.sender || d.username;
        div.className = 'msg ' + (sender === myTag ? 'me' : '');
        div.innerHTML = `<b>${sender}</b> 
            ${sender === myTag ? `<span class="del-btn" onclick="socket.emit('delete-msg', '${d._id || d.id}')">🗑️</span>` : ''}
            <br>${d.msg || d.text}`;
        document.getElementById('messages').appendChild(div);
        document.getElementById('messages').scrollTop = 99999;
    }

    async function findUser() {
        const tag = document.getElementById('search-input').value.trim();
        const res = await fetch('/search-user', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tag})});
        const data = await res.json();
        if(data.tag) { 
            hiddenChats = hiddenChats.filter(c => c !== data.tag);
            localStorage.setItem('hidden-chats', JSON.stringify(hiddenChats));
            loadSidebar();
            openChat(data.tag, false); 
        } else { alert("Не найден"); }
    }

    function createGroup() {
        const name = prompt("Название группы:");
        if(name) socket.emit('create-group', { name, owner: myTag });
    }

    function addMember() {
        const tag = prompt("Введите ID приглашаемого (Имя#1234):");
        if(tag) socket.emit('add-to-group', { groupId: currentRoom, tag });
    }

    function removeMember() {
        const tag = prompt("Введите ID участника для удаления из группы:");
        if(tag) socket.emit('remove-from-group', { groupId: currentRoom, userTag: tag, adminTag: myTag });
    }

    socket.on('chat message', render);
    socket.on('chat history', h => h.forEach(render));
    socket.on('msg-deleted', id => document.getElementById('msg-'+id)?.remove());
    socket.on('new-chat-notification', loadSidebar);
</script>
</body>
</html>
