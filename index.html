<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; }
        #auth { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        #sidebar { width: 200px; border-right: 1px solid #ccc; padding: 10px; }
        #main { flex: 1; display: flex; flex-direction: column; }
        #messages { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; }
        .msg { margin: 5px; padding: 8px; background: #eee; border-radius: 5px; width: fit-content; }
        .me { align-self: flex-end; background: #0084ff; color: white; }
        .del { color: red; cursor: pointer; margin-left: 10px; font-size: 10px; }
    </style>
</head>
<body>

<div id="auth">
    <h2>Вход</h2>
    <input type="text" id="u" placeholder="Логин"><br>
    <input type="password" id="p" placeholder="Пароль"><br>
    <button onclick="login()">Войти</button>
</div>

<div id="sidebar">
    <b>Ваш ID:</b> <span id="mytag"></span><br><br>
    <input type="text" id="target" placeholder="Кому (Имя#1234)">
    <button onclick="startChat()">Чат</button>
</div>

<div id="main">
    <div id="messages"></div>
    <div style="padding: 10px; display: flex;">
        <input type="text" id="m" style="flex: 1;">
        <button onclick="send()">Отправить</button>
    </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let myTag = '', room = '';

    async function login() {
        const res = await fetch('/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u.value, password: p.value})
        });
        const data = await res.json();
        if(data.status === 'ok') {
            myTag = data.tag;
            mytag.innerText = myTag;
            auth.style.display = 'none';
        } else { alert("Ошибка!"); }
    }

    function startChat() {
        room = [myTag, target.value].sort().join('_');
        messages.innerHTML = '';
        socket.emit('join room', room);
    }

    function send() {
        if(m.value && room) {
            socket.emit('chat message', { room, msg: m.value, sender: myTag });
            m.value = '';
        }
    }

    function render(d) {
        const id = d._id || d.id;
        if(document.getElementById(id)) return;
        const div = document.createElement('div');
        div.id = id;
        div.className = 'msg ' + ((d.sender || d.username) === myTag ? 'me' : '');
        div.innerHTML = `<b>${d.sender || d.username}:</b> ${d.msg || d.text}`;
        if((d.sender || d.username) === myTag) {
            div.innerHTML += ` <span class="del" onclick="socket.emit('delete-msg', '${id}')">🗑️</span>`;
        }
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    socket.on('chat message', render);
    socket.on('chat history', h => h.forEach(render));
    socket.on('msg-deleted', id => document.getElementById(id)?.remove());
</script>
</body>
</html>
